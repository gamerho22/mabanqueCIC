<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CIC — Connexion</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--red:#cc0000;--red2:#e60000;--bg:#ffffff;--bg2:#f9f9f9;--text:#111;--sub:#555;--muted:#aaa;--border:#eee}
html,body{height:100%;font-family:'Outfit',sans-serif;background:#fff;overflow:hidden}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh}

.screen{display:none;flex-direction:column;min-height:100dvh}
.screen.on{display:flex}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.screen.on{animation:up .3s ease}

/* LOGIN */
.l-top{padding:56px 28px 32px;background:#fff;flex-shrink:0}
.l-logo{margin-bottom:36px}
.l-logo img{height:40px;object-fit:contain}
.l-title{font-size:1.75rem;font-weight:800;color:#111;line-height:1.2;margin-bottom:6px}
.l-title span{color:var(--red)}
.l-sub{font-size:.82rem;color:var(--muted);font-weight:400}
.l-body{flex:1;background:#f7f7f7;padding:28px 24px 36px;border-top:1px solid var(--border)}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.field label{font-size:.65rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.1em}
.inp-wrap{position:relative}
.inp-wrap input{width:100%;padding:14px 46px 14px 16px;border:2px solid var(--border);border-radius:12px;font-size:.9rem;color:var(--text);background:#fff;outline:none;font-family:'Outfit',sans-serif;transition:.2s;-webkit-appearance:none}
.inp-wrap input:focus{border-color:var(--red)}
.inp-wrap input::placeholder{color:#ccc}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#bbb;font-size:.9rem;cursor:pointer;background:none;border:none;padding:4px}
.err{display:none;align-items:center;gap:6px;font-size:.72rem;color:var(--red);background:#fff0f0;border:1px solid #ffd5d5;border-radius:8px;padding:8px 12px;margin-top:4px}
.err.on{display:flex}
.forgot{text-align:right;font-size:.72rem;font-weight:600;color:var(--red);cursor:pointer;margin-bottom:24px;margin-top:-8px}
.btn-main{width:100%;padding:16px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.01em}
.btn-main:active{background:#a80000;transform:scale(.98)}
.lock-line{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;font-size:.65rem;color:#bbb}
.lock-line i{color:var(--red);font-size:.7rem}
.or-row{display:flex;align-items:center;gap:12px;margin:20px 0}
.or-row::before,.or-row::after{content:'';flex:1;height:1px;background:var(--border)}
.or-row span{font-size:.65rem;color:#ccc;font-weight:600}
.btn-ghost{width:100%;padding:13px;background:#fff;border:2px solid var(--border);color:var(--sub);border-radius:12px;font-size:.84rem;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px}

/* SMS */
.s-top{padding:40px 24px 28px;background:#fff;flex-shrink:0;position:relative}
.s-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.s-back{width:40px;height:40px;border-radius:50%;background:#f5f5f5;border:none;color:#555;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.s-logo img{height:28px;object-fit:contain}
.s-badge{width:70px;height:70px;border-radius:22px;background:#fff0f0;border:2px solid #ffd5d5;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 18px}
.s-title{font-size:1.4rem;font-weight:800;color:#111;text-align:center;margin-bottom:6px}
.s-desc{font-size:.78rem;color:var(--muted);text-align:center;line-height:1.7}
.s-desc strong{color:#555;font-weight:600}
.s-body{flex:1;background:#f7f7f7;padding:28px 24px 36px;border-top:1px solid var(--border)}
.boxes{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.box{width:46px;height:58px;border:2px solid var(--border);border-radius:12px;font-size:1.35rem;font-weight:800;color:#111;text-align:center;outline:none;background:#fff;transition:.2s;font-family:'Outfit',sans-serif;caret-color:var(--red)}
.box:focus{border-color:var(--red)}
.box.ok{border-color:var(--red);background:#fff8f8}
.resend-wrap{text-align:center;margin-bottom:20px}
.resend-wrap p{font-size:.74rem;color:var(--muted);margin-bottom:5px}
.resend-btn{background:none;border:none;color:var(--red);font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
.resend-btn:disabled{color:#ccc;cursor:default}
.err-sms{display:none;align-items:center;gap:6px;font-size:.72rem;color:var(--red);background:#fff0f0;border:1px solid #ffd5d5;border-radius:8px;padding:8px 12px;margin-top:10px;text-align:center;justify-content:center}
.err-sms.on{display:flex}
.timer-txt{font-size:.68rem;color:#bbb;text-align:center;margin-top:8px}
.timer-txt strong{color:var(--red)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen on" id="sc-login">
  <div class="l-top">
    <div class="l-logo"><img src="https://i.ibb.co/zW1X3SbR/Logo-CIC-2006-svg.png" alt="CIC"></div>
    <div class="l-title">Bonjour,<br><span>connectez-vous</span></div>
    <div class="l-sub">Accédez à votre espace bancaire personnel</div>
  </div>
  <div class="l-body">
    <div class="field">
      <label>Adresse e-mail</label>
      <div class="inp-wrap">
        <input type="email" id="inp-u" placeholder="votre@email.com" autocomplete="username">
        <button class="eye"><i class="fas fa-at" style="color:#ccc"></i></button>
      </div>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <div class="inp-wrap">
        <input type="password" id="inp-p" placeholder="••••••••" autocomplete="current-password">
        <button class="eye" id="eye-btn" onclick="toggleEye()"><i class="fas fa-eye" id="eye-ico"></i></button>
      </div>
      <div class="err" id="err-login"><i class="fas fa-exclamation-circle"></i> Identifiants incorrects.</div>
    </div>
    <div class="forgot">Mot de passe oublié ?</div>
    <button class="btn-main" onclick="doLogin()"><i class="fas fa-arrow-right"></i> Se connecter</button>
    <div class="lock-line"><i class="fas fa-lock"></i> Connexion sécurisée 256 bits</div>
    <div class="or-row"><span>OU</span></div>
    <button class="btn-ghost"><i class="fas fa-headset"></i> Service client CIC</button>
  </div>
</div>

<!-- SMS -->
<div class="screen" id="sc-sms">
  <div class="s-top">
    <div class="s-nav">
      <button class="s-back" onclick="backLogin()"><i class="fas fa-arrow-left"></i></button>
      <div class="s-logo"><img src="https://i.ibb.co/zW1X3SbR/Logo-CIC-2006-svg.png" alt="CIC"></div>
      <div style="width:40px"></div>
    </div>
    <div class="s-badge">💬</div>
    <div class="s-title">Code de sécurité</div>
    <div class="s-desc">Un code à 6 chiffres a été envoyé<br>au <strong>+33 6 •• •• •• 47</strong></div>
  </div>
  <div class="s-body">
    <div class="boxes">
      <input class="box" id="b0" type="text" inputmode="numeric" maxlength="1">
      <input class="box" id="b1" type="text" inputmode="numeric" maxlength="1">
      <input class="box" id="b2" type="text" inputmode="numeric" maxlength="1">
      <input class="box" id="b3" type="text" inputmode="numeric" maxlength="1">
      <input class="box" id="b4" type="text" inputmode="numeric" maxlength="1">
      <input class="box" id="b5" type="text" inputmode="numeric" maxlength="1">
    </div>
    <div class="resend-wrap">
      <p>Pas reçu le code ?</p>
      <button class="resend-btn" id="resend" disabled onclick="resendCode()">Renvoyer (<span id="tv">30</span>s)</button>
    </div>
    <button class="btn-main" id="btn-sms" disabled onclick="checkSMS()" style="opacity:.5;cursor:not-allowed"><i class="fas fa-check"></i> Valider</button>
    <div class="err-sms" id="err-sms"><i class="fas fa-times-circle"></i> Code incorrect. Vérifiez votre SMS.</div>
    <div class="timer-txt">Code valable <strong id="ct">05:00</strong></div>
  </div>
</div>

<script>
function toggleEye(){
  var i=document.getElementById("inp-p"),v=i.type==="password";
  i.type=v?"text":"password";
  document.getElementById("eye-ico").className="fas fa-eye"+(v?"-slash":"");
}

function doLogin(){
  var u=document.getElementById("inp-u").value.trim();
  var p=document.getElementById("inp-p").value.trim();
  var err=document.getElementById("err-login");
  if(u==="grongnetpatricia@gmail.com"&&p==="44454241"){
    err.classList.remove("on");
    document.getElementById("sc-login").classList.remove("on");
    document.getElementById("sc-sms").classList.add("on");
    document.getElementById("b0").focus();
    startTimers();
  } else {
    err.classList.add("on");
  }
}
document.getElementById("inp-p").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});

function backLogin(){
  document.getElementById("sc-sms").classList.remove("on");
  document.getElementById("sc-login").classList.add("on");
  resetBoxes();
}

// Boxes
for(var i=0;i<6;i++){(function(n){
  var b=document.getElementById("b"+n);
  b.addEventListener("input",function(){
    var v=this.value.replace(/\D/g,"");
    this.value=v?v[0]:"";
    this.classList.toggle("ok",!!this.value);
    if(v&&n<5)document.getElementById("b"+(n+1)).focus();
    updateBtn();
  });
  b.addEventListener("keydown",function(e){
    if(e.key==="Backspace"&&!this.value&&n>0)document.getElementById("b"+(n-1)).focus();
  });
  b.addEventListener("paste",function(e){
    e.preventDefault();
    var t=(e.clipboardData||window.clipboardData).getData("text").replace(/\D/g,"").slice(0,6);
    for(var j=0;j<t.length&&j<6;j++){var bx=document.getElementById("b"+j);bx.value=t[j];bx.classList.add("ok");}
    if(t.length>=6)document.getElementById("b5").focus();
    updateBtn();
  });
})(i);}

function getCode(){var s="";for(var i=0;i<6;i++)s+=(document.getElementById("b"+i).value||"");return s;}
function updateBtn(){
  var full=getCode().length===6;
  var btn=document.getElementById("btn-sms");
  btn.disabled=!full;
  btn.style.opacity=full?"1":".5";
  btn.style.cursor=full?"pointer":"not-allowed";
}
function resetBoxes(){
  for(var i=0;i<6;i++){var b=document.getElementById("b"+i);b.value="";b.classList.remove("ok");}
  updateBtn();
  document.getElementById("err-sms").classList.remove("on");
}

function checkSMS(){
  if(getCode()==="200410"){window.location.href="cic_app.html";}
  else{document.getElementById("err-sms").classList.add("on");resetBoxes();document.getElementById("b0").focus();}
}

var rTimer,cTimer;
function startTimers(){
  var r=30,tv=document.getElementById("tv"),rb=document.getElementById("resend");
  rb.disabled=true;clearInterval(rTimer);
  rTimer=setInterval(function(){r--;tv.textContent=r;if(r<=0){clearInterval(rTimer);rb.disabled=false;rb.innerHTML="Renvoyer le code";}},1000);
  var tot=300,ct=document.getElementById("ct");clearInterval(cTimer);
  cTimer=setInterval(function(){tot--;var m=Math.floor(tot/60),s=tot%60;ct.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;if(tot<=0)clearInterval(cTimer);},1000);
}
function resendCode(){resetBoxes();document.getElementById("b0").focus();startTimers();}
</script>
</body>
</html>
